[tool.black]
line-length = 100
target-version = ["py311"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = [
  "E",    # pycodestyle errors
  "W",    # pycodestyle warnings
  "F",    # pyflakes
  "I",    # isort
  "C",    # flake8-comprehensions
  "B",    # flake8-bugbear
  "UP",   # pyupgrade
]
ignore = [
  "E501",  # line too long
  "E203",  # whitespace before ':'
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"
