name: Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  AZURE_RESOURCE_GROUP: rg-aisecreviewer-dev
  AZURE_LOCATION: japaneast
  ACR_NAME: craisecreviewerdev
  BACKEND_IMAGE: aisecreviewer-api
  DEPLOY_ENV: dev

jobs:
  # ============================================================================
  # Infrastructure Deployment
  # ============================================================================
  deploy-infra:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    outputs:
      backend-url: ${{ steps.deploy.outputs.backendUrl }}
      frontend-url: ${{ steps.deploy.outputs.frontendUrl }}
      acr-login-server: ${{ steps.deploy.outputs.acrLoginServer }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Create Resource Group
        run: |
          az group create \
            --name ${{ env.AZURE_RESOURCE_GROUP }} \
            --location ${{ env.AZURE_LOCATION }} \
            --tags project=ai-security-reviewer environment=${{ env.DEPLOY_ENV }}

      - name: Deploy Bicep
        id: deploy
        uses: azure/arm-deploy@v2
        with:
          resourceGroupName: ${{ env.AZURE_RESOURCE_GROUP }}
          template: ./infra/main.bicep
          parameters: >
            environment=${{ env.DEPLOY_ENV }}
            location=${{ env.AZURE_LOCATION }}
            entraIdTenantId=${{ secrets.AZURE_TENANT_ID }}
            entraIdClientId=${{ secrets.AZURE_CLIENT_ID }}
          failOnStdErr: false

  # ============================================================================
  # Backend Deployment
  # ============================================================================
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: deploy-infra

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: |
          az acr login --name ${{ env.ACR_NAME }}

      - name: Build and Push Docker Image
        run: |
          cd backend
          az acr build \
            --registry ${{ env.ACR_NAME }} \
            --image ${{ env.BACKEND_IMAGE }}:${{ github.sha }} \
            --image ${{ env.BACKEND_IMAGE }}:latest \
            .

      - name: Update Container App
        run: |
          # Get ACR credentials
          ACR_USERNAME=$(az acr credential show --name ${{ env.ACR_NAME }} --query username -o tsv)
          ACR_PASSWORD=$(az acr credential show --name ${{ env.ACR_NAME }} --query "passwords[0].value" -o tsv)

          # Update Container App with new image and registry
          az containerapp update \
            --name ca-aisecreviewer-${{ env.DEPLOY_ENV }}-api \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image ${{ needs.deploy-infra.outputs.acr-login-server }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }} \
            --set-env-vars "ENVIRONMENT=${{ env.DEPLOY_ENV }}" \
            --registry-server ${{ needs.deploy-infra.outputs.acr-login-server }} \
            --registry-username "$ACR_USERNAME" \
            --registry-password "$ACR_PASSWORD"

  # ============================================================================
  # Frontend Deployment
  # ============================================================================
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: [deploy-infra, deploy-backend]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ needs.deploy-infra.outputs.backend-url }}
          VITE_AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          VITE_AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

      - name: Deploy to Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'upload'
          app_location: 'frontend'
          output_location: 'dist'
          skip_app_build: true

  # ============================================================================
  # Post-Deployment Verification
  # ============================================================================
  verify-deployment:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: [deploy-infra, deploy-backend, deploy-frontend]

    steps:
      - name: Health Check - Backend
        run: |
          for i in {1..10}; do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ needs.deploy-infra.outputs.backend-url }}/health" || echo "000")
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "✅ Backend health check passed"
              exit 0
            fi
            echo "Attempt $i: HTTP $HTTP_STATUS - Waiting..."
            sleep 10
          done
          echo "❌ Backend health check failed"
          exit 1

      - name: Health Check - Frontend
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://${{ needs.deploy-infra.outputs.frontend-url }}" || echo "000")
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "✅ Frontend health check passed"
          else
            echo "⚠️ Frontend returned HTTP $HTTP_STATUS"
          fi

      - name: Deployment Summary
        run: |
          echo "## 🚀 Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Resource | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend API | ${{ needs.deploy-infra.outputs.backend-url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | https://${{ needs.deploy-infra.outputs.frontend-url }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ inputs.environment || 'dev' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
